<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Technical Debt Report</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 0.5rem;
            text-align: left;
        }

        th {
            background-color: #f5f5f5;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>
</head>

<body>

    <h1>Technical Debt Report</h1>

    <table>
        <thead>
            <tr>
                <th>File Path</th>
                <th>Line Number</th>
                <th>Keyword Match</th>
                <th>Comment</th>
            </tr>
        </thead>
        <tbody>

            {% for file in files %}
            {% for comment in file.comments %}
            <tr>
                <td>{{ file.file_path }}</td>
                <td>{{ comment.line_number }}</td>
                <td>{{ comment.keyword }}</td>
                <td>{{ comment.line_content }}</td>
            </tr>
            {% endfor %}
            {% endfor %}

        </tbody>
    </table>

</body>

</html>
